<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title>Yogurt Manager</title> <link rel="manifest" href="manifest.json"> <meta name="theme-color" content="#3fa34d"> <link rel="icon" href="icon.png"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style> body{ font-family:system-ui; margin:0; padding:12px; background:#f4f7f8; } h1{ text-align:center; } .card{ background:white; padding:14px; margin:10px 0; border-radius:12px; box-shadow:0 3px 8px rgba(0,0,0,0.15); } input,select,textarea{ width:100%; padding:8px; margin:4px 0; border-radius:6px; border:1px solid #ccc; } button{ width:100%; padding:9px; margin-top:6px; border:none; border-radius:8px; background:#3fa34d; color:white; } .zone{ background:#f1f8e9; padding:8px; margin-top:8px; border-radius:8px; } canvas{ margin-top:10px; } </style> </head> <body> <h1>Yogurt Manager</h1> <div class="card"> <h3>Nuevo Cliente</h3> <input id="nombre" placeholder="Nombre y Apellidos"> <input id="direccion" placeholder="Dirección"> <select id="zona"> <option>Norte</option> <option>Sur</option> <option>Este</option> <option>Oeste</option> </select> <input id="telefono" placeholder="Teléfono"> <input id="email" placeholder="Correo"> <select id="plan"> <option value="10">Esencial</option> <option value="18">Familiar</option> <option value="30">Intensivo</option> <option value="60">Empresarial</option> </select> <select id="envase"> <option value="0.5">Envase 1/2L</option> <option value="1">Envase 1L</option> </select> <input id="cantidad" type="number" placeholder="Cantidad envases"> <input id="entrega" type="date"> <textarea id="notas" placeholder="Notas"></textarea> <button onclick="addCliente()">Guardar Cliente</button> </div> <div class="card"> <h3>Dashboard</h3> <div id="stats"></div> </div> <div class="card"> <h3>Producción</h3> <div id="produccion"></div> </div> <div class="card"> <h3>Gráfico ventas</h3> <canvas id="grafico"></canvas> </div> <div class="card"> <h3>Clientes por zona</h3> <div id="zonas"></div> </div> <div class="card"> <button onclick="backup()">Descargar Backup</button> <input type="file" onchange="restore(event)"> </div> <script> if('serviceWorker' in navigator){ navigator.serviceWorker.register('service-worker.js') } let clientes=JSON.parse(localStorage.getItem("clientes")||"[]") function save(){ localStorage.setItem("clientes",JSON.stringify(clientes)) } function addCliente(){ let c={ nombre:nombre.value, direccion:direccion.value, zona:zona.value, telefono:telefono.value, email:email.value, plan:parseFloat(plan.value), envase:parseFloat(envase.value), cantidad:parseInt(cantidad.value), entrega:entrega.value, notas:notas.value, activo:true, moroso:false, ultimoPago:"" } clientes.push(c) save() render() } function render(){ let zonas={"Norte":[],"Sur":[],"Este":[],"Oeste":[]} clientes.forEach((c,i)=>{ zonas[c.zona].push({data:c,index:i}) }) let cont=document.getElementById("zonas") cont.innerHTML="" for(let z in zonas){ let div=document.createElement("div") div.className="zone" div.innerHTML="<b>"+z+"</b>" zonas[z].forEach(o=>{ let c=o.data let d=document.createElement("div") d.innerHTML= ` <b>${c.nombre}</b><br> 📦 ${c.cantidad} envases ${c.envase}L<br> 📅 ${c.entrega}<br> 💰 $${c.plan} ` div.appendChild(d) }) cont.appendChild(div) } calcular() grafico() produccion() } function calcular(){ let litros=0 let ingreso=0 clientes.forEach(c=>{ litros+=c.envase*c.cantidad ingreso+=c.plan }) litros+=2 stats.innerHTML= ` Litros semana: ${litros}<br> Ingreso estimado: $${ingreso} ` } function produccion(){ let medio=0 let uno=0 clientes.forEach(c=>{ if(c.envase==0.5)medio+=c.cantidad if(c.envase==1)uno+=c.cantidad }) produccion.innerHTML= ` Envases 1/2L: ${medio}<br> Envases 1L: ${uno} ` } function grafico(){ let medio=0 let uno=0 clientes.forEach(c=>{ if(c.envase==0.5)medio+=c.cantidad if(c.envase==1)uno+=c.cantidad }) new Chart(document.getElementById("grafico"),{ type:"pie", data:{ labels:["1/2L","1L"], datasets:[{data:[medio,uno]}] } }) } function backup(){ let data=JSON.stringify(clientes) let blob=new Blob([data]) let url=URL.createObjectURL(blob) let a=document.createElement("a") a.href=url a.download="backup_clientes.json" a.click() } function restore(e){ let file=e.target.files[0] let reader=new FileReader() reader.onload=function(){ clientes=JSON.parse(reader.result) save() render() } reader.readAsText(file) } render() </script> </body> </html>
