<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title>Yogurt Manager</title> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style> body{ font-family:system-ui; margin:0; padding:12px; background:#f4f7f8; } h1{text-align:center;} .card{ background:white; padding:14px; margin:10px 0; border-radius:12px; box-shadow:0 3px 8px rgba(0,0,0,0.15); } input,select,textarea{ width:100%; padding:8px; margin:4px 0; border-radius:6px; border:1px solid #ccc; } button{ width:100%; padding:10px; margin-top:6px; border:none; border-radius:8px; background:#3fa34d; color:white; font-size:15px; } .zone{ background:#f1f8e9; padding:8px; margin-top:8px; border-radius:8px; } </style> </head> <body> <h1>Yogurt Manager</h1> <div class="card"> <h3>Nuevo Cliente</h3> <input id="nombre" placeholder="Nombre y Apellidos"> <input id="direccion" placeholder="Dirección"> <select id="zona"> <option value="">Zona</option> <option>Norte</option> <option>Sur</option> <option>Este</option> <option>Oeste</option> </select> <input id="telefono" placeholder="Teléfono"> <input id="email" placeholder="Correo"> <select id="plan"> <option value="">Plan</option> <option value="10">Esencial</option> <option value="18">Familiar</option> <option value="30">Intensivo</option> <option value="60">Empresarial</option> </select> <select id="envase"> <option value="">Envase</option> <option value="0.5">1/2 Litro</option> <option value="1">1 Litro</option> </select> <input id="cantidad" type="number" placeholder="Cantidad de envases"> <input id="entrega" type="date"> <textarea id="notas" placeholder="Notas"></textarea> <button id="guardarBtn">Guardar Cliente</button> </div> <div class="card"> <h3>Dashboard</h3> <div id="stats"></div> </div> <div class="card"> <h3>Producción semanal</h3> <div id="produccion"></div> </div> <div class="card"> <h3>Gráfico ventas</h3> <canvas id="grafico"></canvas> </div> <div class="card"> <h3>Clientes por zona</h3> <div id="zonas"></div> </div> <script> let clientes = JSON.parse(localStorage.getItem("clientes") || "[]") let chart = null document.getElementById("guardarBtn").addEventListener("click", addCliente) function save(){ localStorage.setItem("clientes", JSON.stringify(clientes)) } function addCliente(){ let nombre = document.getElementById("nombre").value let zona = document.getElementById("zona").value let envase = parseFloat(document.getElementById("envase").value) let cantidad = parseInt(document.getElementById("cantidad").value) let plan = parseFloat(document.getElementById("plan").value) if(!nombre || !zona || !envase || !cantidad || !plan){ alert("Completa los campos obligatorios") return } let cliente = { nombre:nombre, direccion:document.getElementById("direccion").value, zona:zona, telefono:document.getElementById("telefono").value, email:document.getElementById("email").value, plan:plan, envase:envase, cantidad:cantidad, entrega:document.getElementById("entrega").value, notas:document.getElementById("notas").value } clientes.push(cliente) save() render() limpiar() } function limpiar(){ document.querySelectorAll("input, textarea").forEach(e=>e.value="") document.querySelectorAll("select").forEach(e=>e.selectedIndex=0) } function render(){ renderZonas() renderStats() renderProduccion() renderGrafico() } function renderZonas(){ let zonas={"Norte":[],"Sur":[],"Este":[],"Oeste":[]} clientes.forEach(c=>{ zonas[c.zona].push(c) }) let cont=document.getElementById("zonas") cont.innerHTML="" for(let z in zonas){ let div=document.createElement("div") div.className="zone" div.innerHTML="<b>"+z+"</b>" zonas[z].forEach(c=>{ let p=document.createElement("div") p.innerHTML= `👤 ${c.nombre}<br> 📦 ${c.cantidad} envases (${c.envase}L)<br> 📅 ${c.entrega}` div.appendChild(p) }) cont.appendChild(div) } } function renderStats(){ let litros=0 let ingreso=0 clientes.forEach(c=>{ litros += c.envase * c.cantidad ingreso += c.plan }) litros += 2 document.getElementById("stats").innerHTML = `Litros necesarios: ${litros}<br> Ingreso estimado: $${ingreso}` } function renderProduccion(){ let medio=0 let uno=0 clientes.forEach(c=>{ if(c.envase==0.5) medio+=c.cantidad if(c.envase==1) uno+=c.cantidad }) document.getElementById("produccion").innerHTML= `Envases 1/2L: ${medio}<br> Envases 1L: ${uno}` } function renderGrafico(){ let medio=0 let uno=0 clientes.forEach(c=>{ if(c.envase==0.5) medio+=c.cantidad if(c.envase==1) uno+=c.cantidad }) if(chart) chart.destroy() chart = new Chart(document.getElementById("grafico"),{ type:"pie", data:{ labels:["1/2L","1L"], datasets:[{data:[medio,uno]}] } }) } render() </script> </body> </html>
